<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Japanese Pokemon Card Price List</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', sans-serif; background: #0f0f1a; color: #fff; min-height: 100vh; }

  header { background: linear-gradient(135deg, #1a1a2e, #16213e); padding: 2rem; text-align: center; border-bottom: 2px solid #e8b84b; }
  header h1 { font-size: 2rem; color: #e8b84b; letter-spacing: 2px; }
  header p { color: #aaa; margin-top: 0.5rem; }

  .controls { padding: 1.5rem 2rem; background: #16213e; display: flex; gap: 1rem; flex-wrap: wrap; align-items: center; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #333; }
  .tabs { display: flex; gap: 0.5rem; }
  .tab { padding: 0.5rem 1.2rem; border-radius: 20px; border: 1px solid #e8b84b; background: transparent; color: #e8b84b; cursor: pointer; font-size: 0.85rem; transition: all 0.2s; }
  .tab.active { background: #e8b84b; color: #000; font-weight: bold; }
  .search { flex: 1; min-width: 200px; padding: 0.5rem 1rem; border-radius: 20px; border: 1px solid #333; background: #0f0f1a; color: #fff; font-size: 0.9rem; }
  .search:focus { outline: none; border-color: #e8b84b; }
  .count { color: #aaa; font-size: 0.85rem; margin-left: auto; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 1rem; padding: 1.5rem 2rem; }

  .card { background: #1a1a2e; border-radius: 12px; overflow: hidden; border: 1px solid #2a2a4a; transition: transform 0.2s, border-color 0.2s; cursor: pointer; }
  .card:hover { transform: translateY(-4px); border-color: #e8b84b; }
  .card img { width: 100%; aspect-ratio: 3/4; object-fit: cover; background: #111; }
  .card-info { padding: 0.75rem; }
  .card-name { font-size: 0.78rem; color: #ddd; line-height: 1.4; margin-bottom: 0.5rem; min-height: 2.5em; }
  .card-price { font-size: 1rem; font-weight: bold; color: #e8b84b; }
  .card-price-usd { font-size: 0.75rem; color: #888; margin-top: 2px; }
  .badge { display: inline-block; font-size: 0.65rem; padding: 2px 6px; border-radius: 4px; margin-bottom: 4px; font-weight: bold; }
  .badge-ar  { background: #1e3a5f; color: #60aaff; }
  .badge-chr { background: #3a1e5f; color: #c060ff; }
  .badge-sr  { background: #5f3a1e; color: #ffaa60; }
  .badge-sar { background: #1e5f3a; color: #60ffaa; }
  .badge-hr  { background: #5f1e3a; color: #ff60aa; }
  .badge-ur  { background: #3a5f1e; color: #aaff60; }
  .badge-mur { background: #5f5f1e; color: #ffff60; }
  .badge-ma  { background: #1e5f5f; color: #60ffff; }
  .badge-ssr { background: #5f1e1e; color: #ff6060; }

  .empty { text-align: center; color: #555; padding: 4rem; font-size: 1.2rem; grid-column: 1/-1; }

  .rate-bar { background: #111; padding: 0.4rem 2rem; font-size: 0.75rem; color: #666; border-bottom: 1px solid #222; }
</style>
</head>
<body>

<header>
  <h1>🎴 Japanese Card Price List</h1>
  <p>Live prices from Cardrush · Pokemon TCG · Sealed & Singles</p>
</header>

<div class="rate-bar">
  Exchange rate: 1 USD = <span id="rate">loading...</span> JPY &nbsp;|&nbsp; Prices include Japanese tax (10%)
</div>

<div class="controls">
  <div class="tabs">
    <button class="tab active" onclick="setTab('all')">All</button>
    <button class="tab" onclick="setTab('AR/CHR')">AR / CHR</button>
    <button class="tab" onclick="setTab('SR/SSR/HR/UR/SAR/MUR/MA')">SR / SAR / UR+</button>
  </div>
  <input class="search" type="text" id="search" placeholder="Search cards..." oninput="render()">
  <span class="count" id="count"></span>
</div>

<div class="grid" id="grid"></div>

<script>
let data = [];
let currentTab = 'all';
let usdRate = 150;

async function loadRate() {
  try {
    const r = await fetch('https://open.er-api.com/v6/latest/USD');
    const j = await r.json();
    usdRate = j.rates.JPY;
    document.getElementById('rate').textContent = usdRate.toFixed(0);
  } catch {
    document.getElementById('rate').textContent = '~150 (fallback)';
  }
}

function getBadge(name) {
  const types = ['MUR','SAR','SSR','CHR','MAR','MA','HR','UR','SR','AR'];
  for (const t of types) {
    if (name.includes(`【${t}】`)) {
      return `<span class="badge badge-${t.toLowerCase()}">${t}</span>`;
    }
  }
  return '';
}

function parsePrice(priceStr) {
  const n = parseInt(priceStr.replace(/[^\d]/g, ''));
  return isNaN(n) ? 0 : n;
}

function toUSD(jpy) {
  return (jpy / usdRate).toFixed(2);
}

function setTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  render();
}

function render() {
  const query = document.getElementById('search').value.toLowerCase();
  let items = [];

  if (currentTab === 'all') {
    data.forEach(cat => items = items.concat(cat.items));
  } else {
    const cat = data.find(c => c.label === currentTab);
    if (cat) items = cat.items;
  }

  if (query) items = items.filter(i => i.name.toLowerCase().includes(query));

  document.getElementById('count').textContent = `${items.length} cards`;

  const grid = document.getElementById('grid');
  if (items.length === 0) {
    grid.innerHTML = '<div class="empty">No cards found</div>';
    return;
  }

  grid.innerHTML = items.map(item => {
    const jpy = parsePrice(item.price);
    const usd = toUSD(jpy);
    return `
      <div class="card" onclick="window.open('${item.link}','_blank')">
        <img src="${item.img}" alt="${item.name}" loading="lazy">
        <div class="card-info">
          ${getBadge(item.name)}
          <div class="card-name">${item.name}</div>
          <div class="card-price">¥${jpy.toLocaleString()}</div>
          <div class="card-price-usd">≈ $${usd} USD</div>
        </div>
      </div>`;
  }).join('');
}

async function init() {
  await loadRate();
  const res = await fetch('data.json');
  data = await res.json();
  render();
}

init();
</script>
</body>
</html>
