name: Update Price List

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Install Puppeteer browsers
        run: npx puppeteer browsers install chrome

      - name: Run scraper
        run: node scrape.js

      - name: Run Snkrdunk scraper
        run: node scrape_snkrdunk.js

      - name: Save history
        run: node save_history.js

      - name: Notify Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: node discord_notify.js

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data.json history/
          git diff --staged --quiet || git commit -m "Update prices $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push --force
